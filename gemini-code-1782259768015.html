<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div class="max-w-xl mx-auto mt-12 p-6 bg-white rounded-2xl shadow-md">
        <h2 class="text-2xl font-bold text-center text-emerald-600 mb-6">WhatsApp AI Bot Manager</h2>
        
        <div class="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200">
            <p class="text-sm text-slate-500">Status Bot saat ini:</p>
            <p id="bot-status" class="text-lg font-semibold text-amber-500">Mengecek...</p>
        </div>

        <div class="bg-emerald-50 border-2 border-dashed border-emerald-300 p-6 rounded-xl mb-6 text-center">
            <p class="text-sm text-emerald-700 font-medium mb-2">Kode Pairing Anda:</p>
            <h1 id="pairing-code" class="text-4xl font-mono font-bold tracking-widest text-emerald-600">- - - - - - - -</h1>
        </div>

        <form id="connect-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">Nomor WhatsApp Bot</label>
                <input type="text" id="nomor-hp" placeholder="Contoh: 628123456789" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <small class="text-slate-400 block mt-1">Gunakan kode negara (62), tanpa spasi atau tanda +</small>
            </div>
            
            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200 cursor-pointer">
                Minta Kode Pairing
            </button>
        </form>
    </div>

    <script>
        // Fungsi untuk terus memperbarui status dari backend tiap 3 detik
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const statusEl = document.getElementById('bot-status');
                statusEl.innerText = data.status;

                // Mengubah warna status dinamis
                if(data.status.includes('Terhubung')) {
                    statusEl.className = "text-lg font-semibold text-emerald-600";
                } else if(data.status.includes('Terputus')) {
                    statusEl.className = "text-lg font-semibold text-red-500";
                } else {
                    statusEl.className = "text-lg font-semibold text-amber-500";
                }

                if(data.code) {
                    document.getElementById('pairing-code').innerText = data.code;
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data:", err);
            }
        }

        // Jalankan update status berkala
        setInterval(updateStatus, 3000);
        updateStatus();

        // Event ketika menekan tombol hubungkan
        document.getElementById('connect-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nomor = document.getElementById('nomor-hp').value;

            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nomor })
                });
                const data = await res.json();
                if(data.success) {
                    alert("Kode pairing berhasil dibuat! Silakan lihat layar.");
                } else if (data.message) {
                    alert(data.message);
                }
            } catch (error) {
                alert("Terjadi kesalahan sistem.");
            }
        });
    </script>
</body>
</html>
